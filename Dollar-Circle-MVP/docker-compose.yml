services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dollar_circle
      POSTGRES_USER: dollar_circle
      POSTGRES_PASSWORD: change_me
    ports: ["5432:5432"]
    volumes:
      - dollar_circle_postgres:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: dollar_circle
      DATABASE_USER: dollar_circle
      DATABASE_PASSWORD: change_me
      JWT_SECRET: replace_with_a_long_random_secret
      JWT_EXPIRES_IN: 7d
    ports: ["3000:3000"]
    depends_on: [postgres]
volumes:
  dollar_circle_postgres:
